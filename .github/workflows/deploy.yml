name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deployment; cancel any older queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Using `npm install` (not `ci`) because vitest 4.x's transitive deps
      # drift in ways that npm ci flags as out-of-sync between npm versions
      # even on a freshly regenerated lockfile.
      - run: npm install --no-audit --no-fund

      - run: npm run typecheck

      - run: npm run build
        env:
          # Plumb the OAuth client ID from a repo secret (optional — without
          # it the deployed app runs in local-only mode).
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
